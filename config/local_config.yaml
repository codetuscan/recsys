# Data configuration
data:
  dataset_name: "movielens-1m"
  min_interactions_per_user: 5
  min_interactions_per_item: 5
  time_gap_num_buckets: 20
  test_ratio: 0.2
  negative_samples_train: 1
  negative_samples_eval: 99
  positive_rating_threshold: 3.5
  use_temporal_split: true
  data_subset: null

# Model configuration
model:
  model_name: "purs"
  embedding_dim: 128
  learning_rate: 0.01
  regularization: 0.01
  batch_size: 256
  epochs: 100
  num_workers: 2
  pin_memory: false
  dropout: 0.1
  history_length: 10
  gru_hidden_dim: 128
  num_clusters: 10
  unexpectedness_weight: 0.5

# Experiment configuration
experiment:
  experiment_name: "local_purs_pointwise_baseline"
  seed: 42
  device: "auto"
  checkpoint_every: 2
  eval_every: 1
  k_values: [10]
  early_stopping_patience: 5
  verbose: true

environment: "local"
